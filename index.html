/* ─── Utility Functions ─── */
const generateGroups = (n) => Array.from({length:n},(_,i)=>`G${i+1}`);
const calcMean = (arr) => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
const calcStd = (arr) => {
  if(arr.length<2) return 0;
  const m=calcMean(arr);
  return Math.sqrt(arr.reduce((s,v)=>s+Math.pow(v-m,2),0)/(arr.length-1));
};
const roundTo = (n,d=1) => Math.round(n*Math.pow(10,d))/Math.pow(10,d);

const downloadCSV = (content, filename) => {
  const bom = '\uFEFF';
  const blob = new Blob([bom + content], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
};

const parseCSV = (text) => {
  const lines = text.trim().split('\n').map(l => l.split(',').map(c => c.trim().replace(/^"|"$/g,'')));
  if(lines.length < 2) return { headers: [], rows: [] };
  return { headers: lines[0], rows: lines.slice(1) };
};

const getEmbedUrl = (url) => {
  if(!url) return '';
  const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(match) return `https://drive.google.com/file/d/${match[1]}/preview`;
  if(url.includes('drive.google.com')) return url.replace(/\/view.*$/,'/preview');
  return url;
};

/* ─── Bar Chart Component (pure CSS) ─── */
const BarChart = ({ data, labelKey, valueKey, maxVal, colorFn }) => {
  const max = maxVal || Math.max(...data.map(d=>d[valueKey]),1);
  return (
    <div className="space-y-2">
      {data.map((d,i)=>(
        <div key={i} className="flex items-center gap-3">
          <span className="text-xs font-bold w-10 text-right text-slate-600 dark:text-slate-400 shrink-0">{d[labelKey]}</span>
          <div className="flex-1 bg-slate-100 dark:bg-slate-700 rounded-full h-6 overflow-hidden">
            <div className="h-full rounded-full flex items-center px-2 transition-all duration-700"
              style={{width:`${Math.max((d[valueKey]/max)*100,2)}%`, background: colorFn ? colorFn(i) : '#004030'}}>
              <span className="text-[10px] font-bold text-white whitespace-nowrap">{roundTo(d[valueKey],1)}</span>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
};

    // 4 stages x N groups
    const links = {};
    for(let s=0;s<4;s++) { links[s] = {}; for(let g=0;g<12;g++) links[s][g] = ''; }
    return links;
  });
  const [editingLinks, setEditingLinks] = useState(false);

  // Tab 2 - Individual Scoring
  const [personalInfo, setPersonalInfo] = useState({ group:'', dept:'', name:'', id:'' });
  const [scores, setScores] = useState({});
  const [feedbacks, setFeedbacks] = useState({});

  // Tab 3 - Group Leader
  const [memberCSVs, setMemberCSVs] = useState([]);

  // Tab 4 - Class Summary
  const [groupCSVs, setGroupCSVs] = useState([]);

  // Ensure pdfLinks has entries for all groups when groupCount changes
  useEffect(() => {
    setPdfLinks(prev => {
      const next = {};
      for(let s=0;s<4;s++) {
        next[s] = {};
        for(let g=0;g<groupCount;g++) {
          next[s][g] = prev[s]?.[g] || '';
        }
      }
      return next;
    });
  }, [groupCount]);

  // Dark mode
  useEffect(() => {
    document.documentElement.classList.toggle('dark', isDark);
  }, [isDark]);

  // Close menu on outside click
  useEffect(() => {
    if(!menuOpen) return;
    const handler = (e) => { if(menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [menuOpen]);

  const tabItems = [
    { id:0, label: t.tab_pdf, icon: <IconFileText size={18}/> },
    { id:1, label: t.tab_score, icon: <IconGlobe size={18}/> },
    { id:2, label: t.tab_leader, icon: <IconUsers size={18}/> },
    { id:3, label: t.tab_class, icon: <IconBarChart size={18}/> },
  ];

  const otherGroups = useMemo(() => {
    if(!personalInfo.group) return groups;
    return groups.filter(g => g !== personalInfo.group);
  }, [personalInfo.group, groups]);

  /* ─── Tab 2: Score helpers ─── */
  const getScore = (group, type) => scores[`${tpStage}_${group}_${type}`] || 50;
  const setScore = (group, type, val) => {
    setScores(prev => ({...prev, [`${tpStage}_${group}_${type}`]: Number(val)}));
  };
  const getTotal = (group) => {
    const c = getScore(group, 'content');
    const d = getScore(group, 'delivery');
    return roundTo(c * 0.5 + d * 0.5, 1);

      </div>
      <div className="bg-amber-50 dark:bg-amber-900/20 rounded-lg px-4 py-2 border border-amber-200 dark:border-amber-700/50 text-xs text-amber-800 dark:text-amber-300 flex items-center gap-2">
        <IconAlertTriangle size={14}/> {t.teacher_only}
      </div>
      {/* Import */}
      <div className="flex flex-wrap gap-3">
        <label className="flex items-center gap-2 px-5 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg cursor-pointer hover:bg-[#002b20] dark:hover:bg-white transition-colors shadow-md text-sm">
          <IconUpload size={16}/> {t.import_group_csv}
          <input type="file" accept=".csv" multiple onChange={handleImportGroupCSV} className="hidden"/>
        </label>
        {groupCSVs.length > 0 && (
          <button onClick={exportClassCSV}
            className="flex items-center gap-2 px-5 py-2.5 border-2 border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg hover:bg-[#004030]/5 dark:hover:bg-[#D8C3A5]/10 transition-colors text-sm">
            <IconDownload size={16}/> {t.export_class_csv}
          </button>
        )}
      </div>
      {/* Imported Groups */}
      <div>
        <h3 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3">
          {t.imported_groups} ({groupCSVs.length})
        </h3>
        {groupCSVs.length === 0 ? (
          <div className="bg-slate-50 dark:bg-slate-900/50 rounded-xl p-8 text-center text-slate-400 dark:text-slate-500 border border-dashed border-slate-300 dark:border-slate-600">
            <IconUpload size={32} className="mx-auto mb-2 opacity-30"/>
            <p>{t.no_groups}</p>
          </div>
        ) : (
          <div className="flex flex-wrap gap-2">
            {groupCSVs.map((g,i)=>(
              <div key={i} className="flex items-center gap-2 bg-white dark:bg-slate-800 rounded-lg px-3 py-2 border border-slate-200 dark:border-slate-700 text-sm">
                <IconFileText size={14} className="text-[#004030] dark:text-[#D8C3A5]"/>
                <span className="font-bold text-slate-700 dark:text-slate-300">{g.evalGroup}</span>
                <span className="text-slate-400">({g.filename})</span>
                <button onClick={()=>removeGroupCSV(i)} className="text-red-400 hover:text-red-600 ml-1"><IconX size={14}/></button>
              </div>
            ))}
          </div>
        )}
      </div>
      {/* Ranking Table */}
      {classStats && classStats.length > 0 && (
        <>
          <div>
            <h3 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3">{t.class_ranking}</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-sm border-collapse">
                <thead>
                  <tr className="bg-[#004030] dark:bg-slate-700 text-white">
                    <th className="px-4 py-2 text-center rounded-tl-lg">{t.rank}</th>
                    <th className="px-4 py-2 text-left">{t.group_name}</th>
                    <th className="px-4 py-2 text-center">{t.avg_score}</th>
                    <th className="px-4 py-2 text-center">{t.std}</th>
                    <th className="px-4 py-2 text-center rounded-tr-lg">N</th>
                  </tr>
                </thead>
                <tbody>
                  {classStats.map((s,i)=>(
                    <tr key={i} className={`border-b border-slate-100 dark:border-slate-700 ${i%2===0?'bg-slate-50 dark:bg-slate-800/50':''}`}>
                      <td className="px-4 py-2 text-center">
                        {s.rank <= 3 ? (
                          <span className={`inline-flex items-center justify-center w-7 h-7 rounded-full text-xs font-black text-white ${s.rank===1?'bg-yellow-500':s.rank===2?'bg-slate-400':'bg-amber-700'}`}>{s.rank}</span>
                        ) : <span className="text-slate-500 dark:text-slate-400">{s.rank}</span>}
                      </td>
                      <td className="px-4 py-2 font-bold text-[#004030] dark:text-[#D8C3A5]">{s.group}</td>
                      <td className="px-4 py-2 text-center font-bold">{s.mean}</td>
                      <td className="px-4 py-2 text-center text-slate-500 dark:text-slate-400">{s.std}</td>
                      <td className="px-4 py-2 text-center text-slate-500 dark:text-slate-400">{s.n}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          <div>
            <h3 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3">{t.class_chart}</h3>
            <BarChart data={classStats.sort((a,b)=>{
              const na=parseInt(a.group.replace('G',''));
              const nb=parseInt(b.group.replace('G',''));
              return na-nb;
            })} labelKey="group" valueKey="mean" maxVal={100}
              colorFn={(i)=>{
                const sorted = [...classStats].sort((a,b)=>b.mean-a.mean);
                const rank = sorted.findIndex(s=>s.group===classStats.sort((a,b)=>{const na=parseInt(a.group.replace('G',''));const nb=parseInt(b.group.replace('G',''));return na-nb;})[i]?.group)+1;
                if(rank===1) return '#EAB308';
                if(rank===2) return '#94A3B8';
                if(rank===3) return '#B45309';
                return '#004030';
              }}/>
          </div>
        </>
      )}
    </div>
  );

  const renderContent = () => {
    switch(tab) {
      case 0: return renderPdfBrowse();
      case 1: return renderIndividualScoring();
      case 2: return renderLeaderAggregation();
      case 3: return renderClassSummary();
      default: return renderPdfBrowse();
    }
  };

  return (
    <div className="min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans flex flex-col overflow-x-hidden pt-16 selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030]">
      {/* ─── Header ─── */}
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">
        <div className="max-w-7xl mx-auto px-3 sm:px-4 h-16 flex items-center justify-between">
          {/* Left: Menu + Brand */}
          <div className="flex items-center gap-2">
            <div className="relative" ref={menuRef}>
              <button onClick={()=>setMenuOpen(!menuOpen)} className="p-2 hover:bg-white/10 rounded-lg transition-colors" aria-label="Toggle menu">
                {menuOpen ? <IconX size={20}/> : <IconMenu size={20}/>}
              </button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] overflow-x-hidden">
                  <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700">
                    <p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p>
                  </div>
                  {tabItems.map(item=>(
                    <button key={item.id} onClick={()=>{setTab(item.id);setMenuOpen(false);}}
                      className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left
                        ${tab===item.id
                          ? 'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold'
                          : 'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className={tab===item.id?'text-[#D8C3A5]':'opacity-50'}>{item.icon}</span>
                      <span className="truncate">{item.label}</span>
                    </button>
                  ))}
                  <div className="border-t border-slate-200 dark:border-slate-700">
                    <button onClick={()=>{setShowSettings(true);setMenuOpen(false);}}
                      className="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 text-left">
                      <span className="opacity-50"><IconSettings size={18}/></span>
                      <span>{t.settings}</span>
                    </button>
                  </div>
                </div>
              )}
            </div>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 text-white hover:text-[#D8C3A5] transition-colors">
              <span className="font-serif font-black text-[#D8C3A5] text-lg tracking-widest">TPE</span>
              <span className="hidden sm:inline font-serif font-bold text-sm md:text-base text-white">{t.title}</span>
            </button>
          </div>
          {/* Right: Language + Dark mode + Settings */}
          <div className="flex items-center gap-1 sm:gap-2">
            <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')}
              className="px-2 py-1 text-xs sm:text-sm font-bold bg-white/10 hover:bg-white/20 rounded-lg transition-colors">
              {lang==='zh'?'EN':'中'}
            </button>
            <button onClick={()=>setIsDark(!isDark)} className="p-1.5 sm:p-2 hover:bg-white/10 rounded-lg transition-colors">
              {isDark ? <IconSun size={18}/> : <IconMoon size={18}/>}
            </button>
            <button onClick={()=>setShowSettings(true)} className="p-1.5 sm:p-2 hover:bg-white/10 rounded-lg transition-colors">
              <IconSettings size={18}/>
            </button>
          </div>
        </div>
      </header>

      {/* ─── Settings Modal ─── */}
      {showSettings && (
        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/50" onClick={()=>setShowSettings(false)}>
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 w-80 max-w-[90vw] shadow-2xl border border-slate-200 dark:border-slate-700" onClick={e=>e.stopPropagation()}>
            <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-4">{t.settings_title}</h3>
            <div className="mb-4">
              <label className="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">{t.group_count}</label>
              <p className="text-xs text-slate-400 dark:text-slate-500 mb-2">{t.group_count_desc}</p>
              <div className="flex items-center gap-3">
                <input type="number" min="2" max="30" value={tempGroupCount}
                  onChange={e=>setTempGroupCount(Math.max(2,Math.min(30,parseInt(e.target.value)||2)))}
                  className="w-20 px-3 py-2 text-center rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-2 focus:ring-[#004030] dark:focus:ring-[#D8C3A5]"/>
                <span className="text-sm text-slate-500 dark:text-slate-400">{t.groups}</span>
              </div>
            </div>
            <div className="flex justify-end gap-2">
              <button onClick={()=>setShowSettings(false)}
                className="px-4 py-2 text-sm text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200">{t.cancel}</button>
              <button onClick={()=>{setGroupCount(tempGroupCount);setShowSettings(false);}}
                className="px-4 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] text-sm font-bold rounded-lg">{t.save}</button>
            </div>
          </div>
        </div>
      )}

      {/* ─── Body ─── */}
      <div className="flex-1 flex max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 py-6 gap-6">
        {/* Sidebar */}
        <aside className="hidden md:block w-64 shrink-0">
          <div className="sticky top-24 space-y-1">
            {tabItems.map(item=>(
              <button key={item.id} onClick={()=>setTab(item.id)}
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all text-left
                  ${tab===item.id
                    ? 'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold shadow-md'
                    : 'text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm'}`}>
                <span className={tab===item.id?'text-[#D8C3A5]':'opacity-50'}>{item.icon}</span>
                <span>{item.label}</span>
              </button>
            ))}
            <div className="border-t border-slate-200 dark:border-slate-700 my-2 mx-4"/>
            <button onClick={()=>setShowSettings(true)}
              className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm text-left">
              <span className="opacity-50"><IconSettings size={18}/></span>
              <span>{t.settings}</span>
            </button>
          </div>
        </aside>
        {/* Main Content */}
        <main className="flex-1 min-w-0">
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">
            {renderContent()}
          </div>
        </main>
      </div>

      {/* ─── Footer ─── */}
      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-1">
          {t.architect_label}&nbsp;
          <a href={t.architect_url} target="_blank" rel="noopener noreferrer"
            className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">
            {t.architect_name}
          </a>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
