/* ─── Utilities ─── */
const genGroups = n => Array.from({length:n},(_,i)=>`G${i+1}`);
const mean = a => a.length ? a.reduce((s,v)=>s+v,0)/a.length : 0;
const std = a => { if(a.length<2)return 0; const m=mean(a); return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/(a.length-1)); };
const rd = (n,d=1) => Math.round(n*10**d)/10**d;
const dlCSV = (c,f) => { const b=new Blob(['\uFEFF'+c],{type:'text/csv;charset=utf-8;'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u;a.download=f;a.click();URL.revokeObjectURL(u); };
const parseCSV = t => { const l=t.trim().split('\n').map(r=>r.split(',').map(c=>c.trim().replace(/^"|"$/g,''))); return l.length<2?{h:[],r:[]}:{h:l[0],r:l.slice(1)}; };
const embedUrl = u => { if(!u)return''; const m=u.match(/\/d\/([a-zA-Z0-9_-]+)/); if(m)return`https://drive.google.com/file/d/${m[1]}/preview`; if(u.includes('drive.google.com'))return u.replace(/\/view.*$/,'/preview'); return u; };
const FA = '.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx';

/* ─── BarChart ─── */
const BarChart = ({data,lk,vk,max:mx,cf}) => { const m=mx||Math.max(...data.map(d=>d[vk]),1); return <div className="space-y-2">{data.map((d,i)=><div key={i} className="flex items-center gap-3"><span className="text-xs font-bold w-10 text-right text-slate-600 dark:text-slate-400 shrink-0">{d[lk]}</span><div className="flex-1 bg-slate-100 dark:bg-slate-700 rounded-full h-6 overflow-hidden"><div className="h-full rounded-full flex items-center px-2 transition-all duration-700" style={{width:`${Math.max(d[vk]/m*100,2)}%`,background:cf?cf(i):'#004030'}}><span className="text-[10px] font-bold text-white whitespace-nowrap">{rd(d[vk],1)}</span></div></div></div>)}</div>; };

/* ═══════ App ═══════ */
function App(){
  const [lang,setLang]=useState('zh');
  const [isDark,setIsDark]=useState(false);
  const [tab,setTab]=useState(0);
  const [menuOpen,setMenuOpen]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const menuRef=useRef(null);
  const t=dict[lang];

  const [groupCount,setGroupCount]=useState(12);
  const [tmpGC,setTmpGC]=useState(12);
  const groups=useMemo(()=>genGroups(groupCount),[groupCount]);

  // Tab1
  const [tpStage,setTpStage]=useState(0);
  const [selGroup,setSelGroup]=useState(0);
  const [pdfLinks,setPdfLinks]=useState(()=>{const o={};for(let s=0;s<4;s++){o[s]={};for(let g=0;g<30;g++)o[s][g]='';}return o;});
  const [editLinks,setEditLinks]=useState(false);
  const [uploads,setUploads]=useState({}); // key: `s_g` → {name,url,type}

  // Tab2
  const [info,setInfo]=useState({group:'',dept:'',name:'',id:''});
  const [scores,setScores]=useState({});
  const [feedbacks,setFeedbacks]=useState({});
  const [expanded,setExpanded]=useState({});

  // Tab3
  const [memberCSVs,setMemberCSVs]=useState([]);

  // Tab4
  const [groupCSVs,setGroupCSVs]=useState([]);
  const [classOK,setClassOK]=useState(false);
  const [classPW,setClassPW]=useState('');
  const [pwErr,setPwErr]=useState(false);
  const PW='proflolothebest';

  useEffect(()=>{setPdfLinks(p=>{const n={};for(let s=0;s<4;s++){n[s]={};for(let g=0;g<groupCount;g++)n[s][g]=p[s]?.[g]||'';}return n;});},[groupCount]);
  useEffect(()=>{document.documentElement.classList.toggle('dark',isDark);},[isDark]);
  useEffect(()=>{if(!menuOpen)return;const h=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))setMenuOpen(false);};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[menuOpen]);

  const tabs=[
    {id:0,label:t.tab_pdf,icon:<IconFileText size={18}/>},
    {id:1,label:t.tab_score,icon:<IconEdit size={18}/>},
    {id:2,label:t.tab_leader,icon:<IconUsers size={18}/>},
    {id:3,label:t.tab_class,icon:<IconBarChart size={18}/>},
  ];
  const others=useMemo(()=>info.group?groups.filter(g=>g!==info.group):groups,[info.group,groups]);

  // Tab1 helpers
  const onUpload=(e)=>{const f=e.target.files[0];if(!f)return;const u=URL.createObjectURL(f);setUploads(p=>({...p,[`${tpStage}_${selGroup}`]:{name:f.name,url:u,type:f.type}}));e.target.value='';};
  const rmUpload=()=>{const k=`${tpStage}_${selGroup}`;setUploads(p=>{const n={...p};if(n[k]?.url)URL.revokeObjectURL(n[k].url);delete n[k];return n;});};

  // Tab2 helpers
  const gs=(g,ty)=>scores[`${tpStage}_${g}_${ty}`]||50;
  const ss=(g,ty,v)=>setScores(p=>({...p,[`${tpStage}_${g}_${ty}`]:+v}));
  const gt=(g)=>{const c=gs(g,'c'),d=gs(g,'d');return rd(c*.5+d*.5,1);};
  const gf=(g)=>feedbacks[`${tpStage}_${g}`]||'';
  const sf=(g,v)=>setFeedbacks(p=>({...p,[`${tpStage}_${g}`]:v}));
  const infoOK=info.group&&info.dept&&info.name&&info.id;

  const exportPersonal=()=>{
    if(!infoOK)return;
    const sl=`TP${tpStage}`;
    const h=['Stage','Evaluator_Group','Dept','Name','StudentID','Target_Group','Content','Delivery','Total','Feedback'];
    const rows=others.map(g=>{const c=gs(g,'c'),d=gs(g,'d'),tot=rd(c*.5+d*.5,1),fb=gf(g).replace(/,/g,'；').replace(/\n/g,' ');return[sl,info.group,info.dept,info.name,info.id,g,c,d,tot,`"${fb}"`];});
    dlCSV([h.join(','),...rows.map(r=>r.join(','))].join('\n'),`TPE_${sl}_${info.group}_${info.name}_${info.id}.csv`);
  };

  // Tab3 helpers
  const importMember=(e)=>{Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>{const{h,r:rows}=parseCSV(ev.target.result);if(rows.length>0)setMemberCSVs(p=>[...p,{fn:f.name,name:rows[0][3]||f.name,id:rows[0][4]||'',stage:rows[0][0]||'',eg:rows[0][1]||'',rows}]);};r.readAsText(f);});e.target.value='';};
  const rmMember=i=>setMemberCSVs(p=>p.filter((_,j)=>j!==i));

  const leaderStats=useMemo(()=>{
    if(!memberCSVs.length)return null;
    const gs={};
    memberCSVs.forEach(m=>m.rows.forEach(r=>{
      const tg=r[5],c=parseFloat(r[6]),d=parseFloat(r[7]),tot=parseFloat(r[8]);
      if(!isNaN(tot)){if(!gs[tg])gs[tg]=[];gs[tg].push({member:m.name,mid:m.id,c,d,tot});}
    }));
    return Object.entries(gs).map(([g,sc])=>({
      group:g, scores:sc,
      cM:rd(mean(sc.map(s=>s.c)),1), cS:rd(std(sc.map(s=>s.c)),1),
      dM:rd(mean(sc.map(s=>s.d)),1), dS:rd(std(sc.map(s=>s.d)),1),
      tM:rd(mean(sc.map(s=>s.tot)),1), tS:rd(std(sc.map(s=>s.tot)),1),
    })).sort((a,b)=>parseInt(a.group.replace('G',''))-parseInt(b.group.replace('G','')));
  },[memberCSVs]);

  const exportGroup=()=>{
    if(!leaderStats||!memberCSVs.length)return;
    const st=memberCSVs[0]?.stage||'TP0',eg=memberCSVs[0]?.eg||'G0';
    const dH=['Stage','Evaluator_Group','Member_Name','Member_ID','Target_Group','Content','Delivery','Total'];
    const dR=[];leaderStats.forEach(s=>s.scores.forEach(sc=>dR.push([st,eg,sc.member,sc.mid,s.group,sc.c,sc.d,sc.tot])));
    const sH=['Stage','Evaluator_Group','Target_Group','Content_Mean','Content_StdDev','Delivery_Mean','Delivery_StdDev','Total_Mean','Total_StdDev','N_Evaluators'];
    const sR=leaderStats.map(s=>[st,eg,s.group,s.cM,s.cS,s.dM,s.dS,s.tM,s.tS,s.scores.length]);

            <input type="password" placeholder={t.password_placeholder} value={classPW} onChange={e=>{setClassPW(e.target.value);setPwErr(false);}} onKeyDown={e=>{if(e.key==='Enter'){if(classPW===PW)setClassOK(true);else setPwErr(true);}}} className={`w-full px-4 py-3 rounded-lg border ${pwErr?'border-red-400':'border-slate-200 dark:border-slate-700'} bg-slate-50 dark:bg-slate-900 text-slate-700 dark:text-slate-300 text-center text-sm focus:outline-none focus:ring-2 focus:ring-[#004030] dark:focus:ring-[#D8C3A5]`}/>
            {pwErr&&<p className="text-xs text-red-500">{t.password_error}</p>}
            <button onClick={()=>{if(classPW===PW)setClassOK(true);else setPwErr(true);}} className="w-full px-6 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg hover:bg-[#002b20] dark:hover:bg-white transition-colors">{t.password_submit}</button>
          </div>
        </div>
      </div>
    </div>;
    return <div className="space-y-6 animate-fade-in">
      <div><h2 className="text-2xl sm:text-3xl font-serif font-black text-[#004030] dark:text-[#D8C3A5]">{t.class_title}</h2><p className="mt-2 text-slate-600 dark:text-slate-400">{t.class_desc}</p></div>
      <div className="bg-amber-50 dark:bg-amber-900/20 rounded-lg px-4 py-2 border border-amber-200 dark:border-amber-700/50 text-xs text-amber-800 dark:text-amber-300 flex items-center gap-2"><IconWarn size={14}/>{t.teacher_only}</div>
      <div className="flex flex-wrap gap-3">
        <label className="flex items-center gap-2 px-5 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg cursor-pointer hover:bg-[#002b20] dark:hover:bg-white transition-colors shadow-md text-sm"><IconUpload size={16}/>{t.import_group_csv}<input type="file" accept=".csv" multiple onChange={importGrp} className="hidden"/></label>
        {groupCSVs.length>0&&<button onClick={exportClass} className="flex items-center gap-2 px-5 py-2.5 border-2 border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg hover:bg-[#004030]/5 dark:hover:bg-[#D8C3A5]/10 transition-colors text-sm"><IconDownload size={16}/>{t.export_class_csv}</button>}
      </div>
      <div><h3 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3">{t.imported_groups} ({groupCSVs.length})</h3>
        {!groupCSVs.length?<div className="bg-slate-50 dark:bg-slate-900/50 rounded-xl p-8 text-center text-slate-400 dark:text-slate-500 border border-dashed border-slate-300 dark:border-slate-600"><IconUpload size={32} className="mx-auto mb-2 opacity-30"/><p>{t.no_groups}</p></div>
        :<div className="flex flex-wrap gap-2">{groupCSVs.map((g,i)=><div key={i} className="flex items-center gap-2 bg-white dark:bg-slate-800 rounded-lg px-3 py-2 border border-slate-200 dark:border-slate-700 text-sm"><IconFileText size={14} className="text-[#004030] dark:text-[#D8C3A5]"/><span className="font-bold text-slate-700 dark:text-slate-300">{g.eg}</span><button onClick={()=>rmGrp(i)} className="text-red-400 hover:text-red-600 ml-1"><IconX size={14}/></button></div>)}</div>}
      </div>
      {classStats&&classStats.length>0&&<>
        <div><h3 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3">{t.class_ranking}</h3>
          <div className="overflow-x-auto -mx-4 sm:mx-0"><div className="min-w-[400px] px-4 sm:px-0">
            <table className="w-full text-sm border-collapse"><thead><tr className="bg-[#004030] dark:bg-slate-700 text-white"><th className="px-3 py-2 text-center rounded-tl-lg">{t.rank}</th><th className="px-3 py-2 text-left">{t.group_name}</th><th className="px-3 py-2 text-center">{t.avg_score}</th><th className="px-3 py-2 text-center">{t.std}</th><th className="px-3 py-2 text-center rounded-tr-lg">N</th></tr></thead>
              <tbody>{classStats.map((s,i)=><tr key={i} className={`border-b border-slate-100 dark:border-slate-700 ${i%2===0?'bg-slate-50 dark:bg-slate-800/50':''}`}>
                <td className="px-3 py-2 text-center">{s.rank<=3?<span className={`inline-flex items-center justify-center w-7 h-7 rounded-full text-xs font-black text-white ${s.rank===1?'bg-yellow-500':s.rank===2?'bg-slate-400':'bg-amber-700'}`}>{s.rank}</span>:<span className="text-slate-500">{s.rank}</span>}</td>
                <td className="px-3 py-2 font-bold text-[#004030] dark:text-[#D8C3A5]">{s.group}</td>
                <td className="px-3 py-2 text-center font-bold">{s.mean}</td><td className="px-3 py-2 text-center text-slate-500">{s.std}</td><td className="px-3 py-2 text-center text-slate-500">{s.n}</td>
              </tr>)}</tbody></table>
          </div></div>
        </div>
        <div><h3 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3">{t.class_chart}</h3>
          <BarChart data={[...classStats].sort((a,b)=>parseInt(a.group.replace('G',''))-parseInt(b.group.replace('G','')))} lk="group" vk="mean" max={100} cf={()=>'#004030'}/>
        </div>
      </>}
    </div>;
  };

  const content = [renderTab0,renderTab1,renderTab2,renderTab3][tab]||renderTab0;

  return <div className="min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans flex flex-col overflow-x-hidden pt-16 selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030]">
    {/* Header */}
    <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">
      <div className="max-w-7xl mx-auto px-3 sm:px-4 h-16 flex items-center justify-between">
        <div className="flex items-center gap-2 min-w-0">
          <div className="relative shrink-0" ref={menuRef}>
            <button onClick={()=>setMenuOpen(!menuOpen)} className="p-2 hover:bg-white/10 rounded-lg transition-colors" aria-label="Menu">{menuOpen?<IconX size={20}/>:<IconMenu size={20}/>}</button>
            {menuOpen&&<div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100]">
              <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div>
              {tabs.map(x=><button key={x.id} onClick={()=>{setTab(x.id);setMenuOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left ${tab===x.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold':'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}><span className={tab===x.id?'text-[#D8C3A5]':'opacity-50'}>{x.icon}</span><span className="truncate">{x.label}</span></button>)}
              <div className="border-t border-slate-200 dark:border-slate-700"><button onClick={()=>{setShowSettings(true);setMenuOpen(false);}} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 text-left"><span className="opacity-50"><IconSettings size={18}/></span><span>{t.settings}</span></button></div>
            </div>}
          </div>
          <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 text-white hover:text-[#D8C3A5] transition-colors min-w-0">
            <span className="font-serif font-black text-[#D8C3A5] text-lg tracking-widest shrink-0">TPE</span>
            <span className="hidden sm:inline font-serif font-bold text-sm md:text-base text-white truncate">{t.title}</span>
          </button>
        </div>
        <div className="flex items-center gap-1 sm:gap-2 shrink-0">
          <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')} className="px-2 py-1 text-xs sm:text-sm font-bold bg-white/10 hover:bg-white/20 rounded-lg transition-colors">{lang==='zh'?'EN':'中'}</button>
          <button onClick={()=>setIsDark(!isDark)} className="p-1.5 sm:p-2 hover:bg-white/10 rounded-lg transition-colors">{isDark?<IconSun size={18}/>:<IconMoon size={18}/>}</button>
          <button onClick={()=>setShowSettings(true)} className="p-1.5 sm:p-2 hover:bg-white/10 rounded-lg transition-colors"><IconSettings size={18}/></button>
        </div>
      </div>
    </header>
    {/* Settings Modal */}
    {showSettings&&<div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/50 p-4" onClick={()=>setShowSettings(false)}>
      <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 w-80 max-w-full shadow-2xl border border-slate-200 dark:border-slate-700" onClick={e=>e.stopPropagation()}>
        <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-4">{t.settings_title}</h3>
        <div className="mb-4"><label className="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">{t.group_count}</label><p className="text-xs text-slate-400 mb-2">{t.group_count_desc}</p>
          <div className="flex items-center gap-3"><input type="number" min="2" max="30" value={tmpGC} onChange={e=>setTmpGC(Math.max(2,Math.min(30,parseInt(e.target.value)||2)))} className="w-20 px-3 py-2 text-center rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-2 focus:ring-[#004030] dark:focus:ring-[#D8C3A5]"/><span className="text-sm text-slate-500">{t.groups}</span></div>
        </div>
        <div className="flex justify-end gap-2"><button onClick={()=>setShowSettings(false)} className="px-4 py-2 text-sm text-slate-500 hover:text-slate-700 dark:text-slate-400">{t.cancel}</button><button onClick={()=>{setGroupCount(tmpGC);setShowSettings(false);}} className="px-4 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] text-sm font-bold rounded-lg">{t.save}</button></div>
      </div>
    </div>}
    {/* Body */}
    <div className="flex-1 flex max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 py-6 gap-6">
      <aside className="hidden md:block w-56 lg:w-64 shrink-0"><div className="sticky top-24 space-y-1">
        {tabs.map(x=><button key={x.id} onClick={()=>setTab(x.id)} className={`w-full flex items-center gap-3 px-3 lg:px-4 py-3 rounded-xl text-sm font-medium transition-all text-left ${tab===x.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold shadow-md':'text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm'}`}><span className={`shrink-0 ${tab===x.id?'text-[#D8C3A5]':'opacity-50'}`}>{x.icon}</span><span className="truncate">{x.label}</span></button>)}
        <div className="border-t border-slate-200 dark:border-slate-700 my-2 mx-4"/>
        <button onClick={()=>setShowSettings(true)} className="w-full flex items-center gap-3 px-3 lg:px-4 py-3 rounded-xl text-sm text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm text-left"><span className="opacity-50 shrink-0"><IconSettings size={18}/></span><span>{t.settings}</span></button>
      </div></aside>
      <main className="flex-1 min-w-0"><div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">{content()}</div></main>
    </div>
    {/* Footer */}
    <footer className="h-8 bg-[#004030] flex items-center justify-between px-3 sm:px-4 shrink-0">
      <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs truncate">{t.date} · {t.copyright}</span>
      <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-1 shrink-0">{t.architect_label}&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">{t.architect_name}</a></span>
    </footer>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
